<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reset Password | Organisation</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Login.css">
</head>

<body>
    <div class="login-container">
        
      
        <div class="hero-section">
            <div class="hero-overlay"></div>
            
            <div class="logo-section">
                <a href="/index.html" class="logo-link">
                    <img src="images/IMG-20260220-WA0011.jpg" alt="Last Mile Links">
                    <span>Last Mile Links</span>
                </a>
            </div>
            
            <div class="hero-content">
                <h1>Password Recovery</h1>
                <p>Enter your registered email address and we'll send you a secure password reset link.</p>
            </div>
            <div class="footer-copy">© 2026 Last Mile Links. All Rights Reserved.</div>
        </div>

        
        <div class="form-section">
            <div class="form-wrapper">
                <h2>Reset Your Password</h2>
                <p class="subtitle">
                    Remember your password? <a href="Login.html">Back to Login</a>
                </p>

                <form id="resetForm">
                    <div class="input-group">
                        <label>Email Address</label>
                        <input 
                            type="email" 
                            id="email" 
                            required>
                    </div>

                    <button type="submit" class="btn-primary">
                        Send Reset Link
                    </button>

                    <p id="message" style="margin-top:15px;"></p>
                </form>
            </div>
        </div>
    </div>

<script>
document.getElementById("resetForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const email = document.getElementById("email").value;
    const message = document.getElementById("message");

   
    const emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;
    if (!email.match(emailPattern)) {
        message.style.color = "red";
        message.innerText = "Please enter a valid email address.";
        return;
    }

    try {
        
        const response = await fetch("http://localhost:3000/api/reset-password", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ email })
        });

        const data = await response.json();

        if (response.ok) {
            message.style.color = "green";
            message.innerText = "Reset link sent successfully! Check your email.";
        } else {
            message.style.color = "red";
            message.innerText = data.message || "Email not found.";
        }

    } catch (error) {
        message.style.color = "red";
        message.innerText = "Server error. Please try again later.";
    }
});
</script>

</body>
</html>

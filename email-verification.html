<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Last Mile Links | Verify Email</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="shortcut icon" href="images/IMG-20260220-WA0012.jpg" type="image/x-icon">
<link rel="stylesheet" href="style.css">
<style>
    .verify-container {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        background: linear-gradient(135deg, #111 0%, #1a1a1a 100%);
    }
    
    .verify-card {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 179, 71, 0.2);
        border-radius: 20px;
        padding: 50px 40px;
        max-width: 450px;
        width: 100%;
        text-align: center;
        position: relative;
        overflow: hidden;
    }
    
    .verify-card::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 4px;
        background: linear-gradient(90deg, #ffb347, #ffa500);
    }
    
    .verify-icon {
        width: 80px;
        height: 80px;
        background: linear-gradient(135deg, rgba(255, 179, 71, 0.2) 0%, rgba(255, 165, 0, 0.1) 100%);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 25px;
        font-size: 36px;
        color: #ffb347;
        border: 2px solid rgba(255, 179, 71, 0.3);
        animation: pulse 2s ease-in-out infinite;
    }
    
    @keyframes pulse {
        0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 179, 71, 0.4); }
        50% { transform: scale(1.05); box-shadow: 0 0 20px 10px rgba(255, 179, 71, 0.1); }
    }
    
    .verify-card h1 {
        font-size: 24px;
        margin-bottom: 15px;
        color: #fff;
    }
    
    .verify-card p {
        color: #aaa;
        font-size: 14px;
        line-height: 1.6;
        margin-bottom: 30px;
    }
    
    .email-display {
        background: rgba(255, 179, 71, 0.1);
        border: 1px solid rgba(255, 179, 71, 0.2);
        border-radius: 10px;
        padding: 15px;
        margin-bottom: 25px;
        font-size: 14px;
        color: #ffb347;
        word-break: break-all;
    }
    
    .code-inputs {
        display: flex;
        gap: 10px;
        justify-content: center;
        margin-bottom: 25px;
    }
    
    .code-input {
        width: 50px;
        height: 60px;
        background: rgba(255, 255, 255, 0.05);
        border: 2px solid rgba(255, 255, 255, 0.1);
        border-radius: 10px;
        color: #fff;
        font-size: 24px;
        font-weight: 700;
        text-align: center;
        transition: all 0.3s ease;
    }
    
    .code-input:focus {
        outline: none;
        border-color: #ffb347;
        background: rgba(255, 179, 71, 0.05);
    }
    
    .btn-verify {
        width: 100%;
        padding: 15px;
        background: linear-gradient(135deg, #ffb347 0%, #ffa500 100%);
        color: #111;
        border: none;
        border-radius: 8px;
        font-family: 'Montserrat', sans-serif;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.3s ease;
        margin-bottom: 20px;
    }
    
    .btn-verify:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 25px rgba(255, 179, 71, 0.3);
    }
    
    .btn-verify:disabled {
        background: #444;
        color: #888;
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
    }
    
    .resend-section {
        margin-top: 20px;
        padding-top: 20px;
        border-top: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .resend-section p {
        margin-bottom: 10px;
        font-size: 13px;
    }
    
    .btn-resend {
        background: transparent;
        border: 2px solid rgba(255, 179, 71, 0.3);
        color: #ffb347;
        padding: 10px 25px;
        border-radius: 30px;
        font-family: 'Montserrat', sans-serif;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
    }
    
    .btn-resend:hover {
        background: rgba(255, 179, 71, 0.1);
        border-color: #ffb347;
    }
    
    .btn-resend:disabled {
        color: #666;
        border-color: #444;
        cursor: not-allowed;
    }
    
    .countdown {
        color: #ffb347;
        font-weight: 600;
    }
    
    .back-link {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: #aaa;
        text-decoration: none;
        font-size: 13px;
        margin-top: 20px;
        transition: color 0.3s ease;
    }
    
    .back-link:hover {
        color: #ffb347;
    }
    
    /* Success state */
    .verify-card.success .verify-icon {
        background: linear-gradient(135deg, #27ae60 0%, #229954 100%);
        border-color: #27ae60;
        color: #fff;
        animation: none;
    }
    
    .verify-card.success::before {
        background: linear-gradient(90deg, #27ae60, #229954);
    }
    
    /* Error shake animation */
    @keyframes shake {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-10px); }
        75% { transform: translateX(10px); }
    }
    
    .code-input.error {
        border-color: #e74c3c;
        animation: shake 0.4s ease;
    }
    
    @media (max-width: 480px) {
        .verify-card {
            padding: 35px 25px;
        }
        
        .code-input {
            width: 45px;
            height: 55px;
            font-size: 20px;
        }
    }
</style>
</head>
<body>

<div class="verify-container">
    <div class="verify-card" id="verifyCard">
        <div class="verify-icon">
            <i class="fas fa-envelope-open-text"></i>
        </div>
        
        <h1>Verify Your Email</h1>
        <p>We've sent a 6-digit verification code to your email address. Enter the code below to confirm your account.</p>
        
        <div class="email-display" id="userEmail">user@example.com</div>
        
        <form id="verifyForm">
            <div class="code-inputs">
                <input type="text" class="code-input" maxlength="1" pattern="[0-9]" required>
                <input type="text" class="code-input" maxlength="1" pattern="[0-9]" required>
                <input type="text" class="code-input" maxlength="1" pattern="[0-9]" required>
                <input type="text" class="code-input" maxlength="1" pattern="[0-9]" required>
                <input type="text" class="code-input" maxlength="1" pattern="[0-9]" required>
                <input type="text" class="code-input" maxlength="1" pattern="[0-9]" required>
            </div>
            
            <button type="submit" class="btn-verify" id="verifyBtn">
                Verify Email <i class="fas fa-arrow-right"></i>
            </button>
        </form>
        
        <div class="resend-section">
            <p>Didn't receive the code?</p>
            <button class="btn-resend" id="resendBtn" onclick="resendCode()">
                Resend Code <span id="countdown"></span>
            </button>
        </div>
        
        <a href="Login.html" class="back-link">
            <i class="fas fa-arrow-left"></i> Back to Login
        </a>
    </div>
</div>

<script>
    // Get email from URL parameter or localStorage
    const urlParams = new URLSearchParams(window.location.search);
    const email = urlParams.get('email') || localStorage.getItem('pendingEmail') || 'user@example.com';
    document.getElementById('userEmail').textContent = email;
    
    // Auto-focus and auto-advance inputs
    const inputs = document.querySelectorAll('.code-input');
    
    inputs.forEach((input, index) => {
        // Only allow numbers
        input.addEventListener('input', (e) => {
            e.target.value = e.target.value.replace(/[^0-9]/g, '');
            
            if (e.target.value && index < inputs.length - 1) {
                inputs[index + 1].focus();
            }
            
            checkComplete();
        });
        
        // Handle backspace
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Backspace' && !e.target.value && index > 0) {
                inputs[index - 1].focus();
            }
        });
        
        // Paste handling
        input.addEventListener('paste', (e) => {
            e.preventDefault();
            const pasteData = e.clipboardData.getData('text').replace(/[^0-9]/g, '').slice(0, 6);
            
            pasteData.split('').forEach((char, i) => {
                if (inputs[i]) inputs[i].value = char;
            });
            
            if (inputs[pasteData.length - 1]) {
                inputs[pasteData.length - 1].focus();
            }
            
            checkComplete();
        });
    });
    
    function checkComplete() {
        const code = Array.from(inputs).map(i => i.value).join('');
        document.getElementById('verifyBtn').disabled = code.length !== 6;
    }
    
    // Form submission
    document.getElementById('verifyForm').addEventListener('submit', (e) => {
        e.preventDefault();
        
        const code = Array.from(inputs).map(i => i.value).join('');
        const btn = document.getElementById('verifyBtn');
        
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Verifying...';
        
        // Simulate verification (replace with actual API call)
        setTimeout(() => {
            // Success simulation - replace with actual verification logic
            if (code === '123456') { // Demo code
                showSuccess();
            } else {
                showError();
                btn.disabled = false;
                btn.innerHTML = 'Verify Email <i class="fas fa-arrow-right"></i>';
            }
        }, 1500);
    });
    
    function showSuccess() {
        const card = document.getElementById('verifyCard');
        card.classList.add('success');
        
        card.innerHTML = `
            <div class="verify-icon">
                <i class="fas fa-check"></i>
            </div>
            <h1>Email Verified!</h1>
            <p>Your email has been successfully verified. You can now access your account.</p>
            <button class="btn-verify" onclick="window.location.href='Login.html'">
                Continue to Login <i class="fas fa-arrow-right"></i>
            </button>
        `;
    }
    
    function showError() {
        inputs.forEach(input => {
            input.classList.add('error');
            setTimeout(() => input.classList.remove('error'), 500);
        });
        
        // Shake animation on button
        const btn = document.getElementById('verifyBtn');
        btn.style.animation = 'shake 0.4s ease';
        setTimeout(() => btn.style.animation = '', 400);
    }
    
    // Resend code with countdown
    let countdownTimer;
    let timeLeft = 60;
    
    function resendCode() {
        const btn = document.getElementById('resendBtn');
        const countdownSpan = document.getElementById('countdown');
        
        btn.disabled = true;
        
        // Simulate resend
        console.log('Resending code to:', email);
        
        countdownTimer = setInterval(() => {
            timeLeft--;
            countdownSpan.textContent = `(${timeLeft}s)`;
            
            if (timeLeft <= 0) {
                clearInterval(countdownTimer);
                btn.disabled = false;
                countdownSpan.textContent = '';
                timeLeft = 60;
            }
        }, 1000);
    }
    
    // Focus first input on load
    inputs[0].focus();
</script>

</body>
</html>
